function lbl(v){if(v<=3)return"Critical gap";if(v<=6)return"Moderate";if(v<=9)return"Strong";return"Fully optimized";}
function scoreFor(ans,pillar){const[s,e]=RANGES[pillar];const sl=ans.slice(s,e+1);const valid=sl.filter(v=>v!==null);if(!valid.length)return 0;return Math.round((valid.reduce((a,b)=>a+SCORES[b],0)/valid.length)*10)/10;}
function splitLbl(text){
  const ei=text.indexOf(" — ");if(ei>0&&ei<35)return{head:text.slice(0,ei),body:text.slice(ei+3)};
  const ci=text.indexOf(": ");if(ci>0&&ci<35)return{head:text.slice(0,ci),body:text.slice(ci+2)};
  const pi=text.indexOf(". ");if(pi>0)return{head:text.slice(0,pi+1),body:text.slice(pi+2)};
  return{head:text,body:""};
}

function selectV(v){
  variant=v;
  ["partner","report","managed"].forEach(opt=>{
    const el=document.getElementById("vp-"+opt);if(!el)return;
    if(opt===v){el.style.border="2px solid #1D9E75";el.style.opacity="1";el.style.background="#E1F5EE";el.style.color="#085041";}
    else{el.style.border="0.5px solid rgba(8,8,8,0.15)";el.style.opacity="0.5";el.style.background="rgba(255,255,255,0.8)";el.style.color="#080808";}
  });
  const desc=document.getElementById("vdesc");if(desc){desc.textContent=VDESCS[v];desc.style.opacity="1";}
  const btn=document.getElementById("rel-cta");if(btn){btn.style.opacity="1";btn.style.cursor="pointer";}
}

function selectOpt(opt){
  const a=[...answers];a[idx]=opt;answers=a;
  const q=QA[idx],p=PS[q.pillar];
  OPTS.forEach(o=>{
    const el=document.getElementById("ro-"+o);if(!el)return;
    const radio=el.querySelector("input[type=radio]");
    const heads=el.querySelectorAll(".lbl-head");
    const bodies=el.querySelectorAll(".lbl-body");
    if(o===opt){
      el.style.border="2px solid "+p.accent;el.style.background=p.bg;el.style.color=p.text;
      if(radio)radio.checked=true;
      heads.forEach(h=>{h.style.color=p.text;});
      bodies.forEach(b=>{b.style.color=p.text;b.style.opacity="0.9";});
    }else{
      el.style.border="0.5px solid rgba(8,8,8,0.15)";el.style.background="rgba(255,255,255,0.8)";el.style.color="#080808";
      if(radio)radio.checked=false;
      heads.forEach(h=>{h.style.color="#080808";});
      bodies.forEach(b=>{b.style.color="rgba(8,8,8,0.65)";b.style.opacity="1";});
    }
  });
  const btn=document.getElementById("next-btn");if(btn){btn.style.opacity="1";btn.style.cursor="pointer";}
}

function submitForm(){
  const fn=document.getElementById("inp-name"),em=document.getElementById("inp-email"),err=document.getElementById("form-err");
  if(!fn||!em)return;
  const fnv=fn.value.trim(),emv=em.value.trim();
  if(!fnv||!emv||!emv.includes("@")||!emv.includes(".")){if(err){err.textContent="Please enter your first name and a valid email.";err.style.opacity="1";}return;}
  firstName=fnv;phase="confirmed";r();
}

function transH(){
  const p=PS[pendingT];
  return`<div class="wrap" style="text-align:center;padding-top:3rem;padding-bottom:3rem;">
  <div style="font-size:10px;letter-spacing:4px;color:rgba(8,8,8,0.50);text-transform:uppercase;margin-bottom:2rem;">Next pillar</div>

  <button class="nav-btn" onclick="phase='survey';r();" style="font-size:15px;padding:14px 40px;">Continue &rarr;</button>
</div>`;}

function questionH(){
  const q=QA[idx],p=PS[q.pillar];
  const pct=Math.round((idx/21)*100);
  const[ps,pe]=RANGES[q.pillar];
  const sel=answers[idx],hasAns=sel!==null;
  const hasCustom=!!q.labels,labels=q.labels||OLABELS;
  const opts=OPTS.map((o,i)=>{
    const isSel=sel===o,txt=labels[i];
    let inner="";
    if(hasCustom){
      const{head,body}=splitLbl(txt);
      const hc=isSel?p.text:"#080808";
      const bc=isSel?p.text:"rgba(8,8,8,0.65)";
      inner=`<div style="display:flex;flex-direction:column;gap:4px;"><span class="lbl-head" style="font-size:14px;font-weight:700;line-height:1.4;color:${hc};">${head}</span>${body?`<span class="lbl-body" style="font-size:13px;line-height:1.55;color:${bc};">${body}</span>`:""}</div>`;
    }else{
      inner=`<span class="lbl-head" style="font-size:16px;font-weight:${isSel?"600":"400"};color:${isSel?p.text:"#080808"};">${txt}</span>`;
    }
    return`<label id="ro-${o}" class="ropt" onclick="selectOpt('${o}');" style="align-items:${hasCustom?"flex-start":"center"};border:${isSel?"2px solid "+p.accent:"0.5px solid rgba(8,8,8,0.15)"};background:${isSel?p.bg:"rgba(255,255,255,0.8)"};color:${isSel?p.text:"#080808"};">
      <input type="radio" name="q${idx}" value="${o}" ${isSel?"checked":""} style="accent-color:${p.accent};${hasCustom?"margin-top:3px;":""}">
      ${inner}
    </label>`;
  }).join("");
  return`<div class="wrap">
  <div class="bar-track" style="margin-bottom:1.75rem;"><div class="bar-fill" style="width:${pct}%;background:${p.accent};"></div></div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.75rem;">
    <span class="pill" style="background:${p.bg};color:${p.text};">${q.pillar} &middot; ${idx-ps+1} of ${pe-ps+1}</span>
    <span style="font-size:13px;color:rgba(8,8,8,0.50);">${idx+1} / 21</span>
  </div>
  <div style="margin-bottom:1.5rem;">
    <div style="font-size:10px;letter-spacing:3px;text-transform:uppercase;color:${p.accent};margin-bottom:0.75rem;">${q.title}</div>
    <p style="font-size:${hasCustom?"17px":"18px"};color:#080808;line-height:1.55;font-weight:400;">${q.q}</p>
  </div>
  <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:2rem;">${opts}</div>
  <div style="display:flex;gap:12px;justify-content:space-between;">
    <button class="nav-btn" onclick="goBack();" style="opacity:${idx===0?0.35:1};cursor:${idx===0?"not-allowed":"pointer"};">&larr; Back</button>
    <button id="next-btn" class="nav-btn" onclick="goNext();" style="opacity:${hasAns?1:0.35};cursor:${hasAns?"pointer":"not-allowed"};">${idx===20?"See my scores &rarr;":"Next &rarr;"}</button>
  </div>
</div>`;}

function resultsH(){

  <div style="font-size:10px;letter-spacing:4px;color:rgba(8,8,8,0.50);text-transform:uppercase;margin-bottom:1.5rem;text-align:center;">Your gap scores</div>

  <div style="text-align:center;margin-bottom:2rem;"><span class="pill" style="background:#E1F5EE;color:#085041;">Relationship: ${vname}</span></div>
  <div style="margin-bottom:0.5rem;">${pb("Relationships",rS)}${pb("Wealth",wS)}${pb("Identity",iS)}${pb("Health",hS)}</div>
  <div class="divider"></div>
  <div style="margin-bottom:1.5rem;">
    <div style="font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(8,8,8,0.50);margin-bottom:0.75rem;">What comes next</div>
    <p style="font-size:16px;font-weight:700;color:#080808;line-height:1.5;margin-bottom:0.75rem;">Your free Gap Discrepancy Audit</p>
    <p style="font-size:13px;color:rgba(8,8,8,0.72);line-height:1.85;">Your scores show where the gap is. The audit explains the discrepancy between who you say you want to become and what your current sessions are conditioning you to become. Sent to you within 24 hours.</p>
  </div>
  <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:0.75rem;">
    <input id="inp-name" class="field" type="text" placeholder="First name" autocomplete="given-name">
    <input id="inp-email" class="field" type="email" placeholder="Email address" autocomplete="email">
  </div>
  <p id="form-err" style="font-size:13px;color:#D4537E;margin-bottom:0.75rem;opacity:0;min-height:1.2rem;"></p>
  <button class="nav-btn" onclick="submitForm();" style="width:100%;font-size:14px;padding:15px 24px;margin-bottom:1.25rem;letter-spacing:1.5px;">Send my Gap Discrepancy Audit &rarr;</button>
  <div class="ibox">
    <p style="font-size:12px;color:rgba(8,8,8,0.68);line-height:1.85;">Every audit in this phase is manually reviewed — not automated. We are building this system the same way we are asking you to build yourself: deliberately, with real feedback, and with honesty about where we are. Your audit reflects that standard.</p>
  </div>
</div>`;}

  <a href="index.html" style="font-size:12px;color:rgba(8,8,8,0.50);text-decoration:underline;letter-spacing:1px;">Back to home</a>

function goNext(){
  if(!answers[idx])return;
  if(idx===20){phase="results";r();return;}
  idx++;
  if(TRANSITIONS.has(idx)){pendingT=QA[idx].pillar;phase="transition";}
  else phase="survey";
  r();
}
function goBack(){if(idx===0){phase="rel-brief";r();return;}idx--;phase="survey";r();}

render();
</script>
