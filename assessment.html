<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Five-Year Alignment Assessment — 5 Years From Here</title>
<meta name="description" content="Measure the alignment between your current patterns and the life your next five years require.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --deep:#0e0118;
  --plum:#1a0828;
  --mag:#c026d3;
  --mag-light:#e879f9;
  --mag-dim:rgba(192,38,211,0.18);
  --mag-glow:rgba(232,121,249,0.08);
  --off-white:#f5f0f7;
  --muted:rgba(245,240,247,0.55);
  --border:rgba(232,121,249,0.15);
  --font-display:'Cormorant Garamond',Georgia,serif;
  --font-body:'DM Sans',sans-serif;
}
html,body{
  min-height:100vh;
  background:var(--deep);
  color:var(--off-white);
  font-family:var(--font-body);
  font-size:16px;
  line-height:1.6;
  overflow-x:hidden;
}
.page-bg{
  min-height:100vh;
  background:
    radial-gradient(ellipse 70% 50% at 80% 0%, rgba(192,38,211,0.13) 0%, transparent 65%),
    radial-gradient(ellipse 50% 60% at 10% 90%, rgba(139,0,164,0.09) 0%, transparent 60%),
    var(--deep);
}

/* NAV */
.site-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:1.25rem 2rem;
  border-bottom:0.5px solid var(--border);
  background:rgba(14,1,24,0.85);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  position:sticky;top:0;z-index:100;
}
.logo{
  font-family:var(--font-body);
  font-size:11px;font-weight:500;
  letter-spacing:0.2em;text-transform:uppercase;
  color:var(--muted);text-decoration:none;
}
.back{
  font-size:11px;letter-spacing:0.15em;text-transform:uppercase;
  color:var(--muted);text-decoration:none;
  transition:color 0.2s;
}
.back:hover{color:var(--off-white);}

/* WRAP */
.wrap{max-width:580px;margin:0 auto;padding:2.5rem 1.5rem;}

/* PILLS */
.pill{
  display:inline-block;
  font-family:var(--font-body);
  font-size:10px;font-weight:500;
  letter-spacing:0.18em;text-transform:uppercase;
  padding:5px 14px;border-radius:2px;
}

/* PROGRESS BAR */
.bar-track{height:2px;background:rgba(232,121,249,0.15);margin-bottom:2rem;}
.bar-fill{height:2px;transition:width 0.4s ease;}

/* OPTION BUTTONS */
.ropt{
  display:flex;gap:14px;padding:18px 20px;
  border-radius:2px;cursor:pointer;width:100%;
  font-family:var(--font-body);
  text-align:left;
  transition:background 0.15s,border-color 0.15s;
}
input[type=radio]{
  width:16px;height:16px;flex-shrink:0;
  margin-top:3px;pointer-events:none;
  accent-color:var(--mag-light);
}
.lbl-head{font-size:14px;font-weight:500;line-height:1.4;}
.lbl-body{font-size:13px;line-height:1.6;margin-top:3px;}

/* VARIANT PILLS */
.vpill{
  display:block;width:100%;text-align:left;
  font-family:var(--font-body);
  font-size:14px;font-weight:400;
  padding:15px 20px;border-radius:2px;cursor:pointer;
  transition:all 0.15s;
}

/* NAV BUTTONS */
.nav-btn{
  font-family:var(--font-body);
  font-size:12px;font-weight:500;
  letter-spacing:0.15em;text-transform:uppercase;
  padding:13px 28px;cursor:pointer;
  border-radius:2px;
  background:linear-gradient(135deg,#e879f9,#c026d3);
  color:var(--deep);border:none;
  transition:opacity 0.2s,transform 0.2s;
}
.nav-btn:hover{opacity:0.88;transform:translateY(-1px);}
.nav-btn.ghost{
  background:transparent;
  color:var(--muted);
  border:0.5px solid var(--border);
}
.nav-btn.ghost:hover{color:var(--off-white);background:var(--mag-glow);}

/* SCORE BARS */
.rb-track{height:3px;background:rgba(232,121,249,0.15);border-radius:3px;margin-top:8px;}
.rb-fill{height:3px;border-radius:3px;}

/* FORM FIELDS */
.field{
  width:100%;font-size:15px;padding:14px 16px;
  border-radius:2px;border:0.5px solid var(--border);
  background:rgba(255,255,255,0.06);
  color:var(--off-white);display:block;
  font-family:var(--font-body);
  transition:border-color 0.2s;
}
.field::placeholder{color:var(--muted);}
.field:focus{outline:none;border-color:rgba(232,121,249,0.5);}

.divider{height:0.5px;background:var(--border);margin:2rem 0;}
.ibox{
  padding:1.25rem 1.5rem;
  background:rgba(232,121,249,0.04);
  border-radius:2px;
  border:0.5px solid var(--border);
}

.big-score{
  font-family:var(--font-display);
  font-size:clamp(72px,14vw,110px);
  font-weight:300;
  color:var(--off-white);
  line-height:1;
  letter-spacing:-0.02em;
}

@media(max-width:480px){
  .wrap{padding:1.5rem 1rem;}
  .site-header{padding:1rem 1.25rem;}
  .nav-btn{font-size:11px;padding:11px 20px;}
  .ropt{padding:14px 14px;gap:12px;}
  .vpill{padding:13px 14px;font-size:13px;}
  .big-score{font-size:72px;}
}
</style>
</head>

const REL={"partner": [{"title": "Authentic Transparency", "q": "Do you feel fully known by your partner — or are there still parts of you that remain edited, protected, or difficult to express honestly?", "labels": ["Protected Self: Important parts of who you are remain hidden because full openness does not consistently feel safe.", "Selective Openness: You share much of yourself, but still edit certain needs, fears, or concerns to avoid conflict or disappointment.", "Mostly Known: You can usually be honest and emotionally present, although a few deeper areas still remain protected.", "Fully Seen: You can show up honestly — emotionally, mentally, physically, and spiritually — without feeling the need to perform or hide."]}, {"title": "Relationship Reciprocity", "q": "Does the relationship feel balanced in openness, care, emotional labor, and repair — or does one person consistently carry more of the weight?", "labels": ["One-Sided Load: One person consistently gives, adjusts, initiates, or repairs more than the other.", "Uneven Exchange: There is genuine care, but the balance of effort and emotional responsibility remains inconsistent.", "Mostly Reciprocal: Both people contribute meaningfully, although certain areas still need a more even exchange.", "Mutual Investment: Care, effort, openness, and repair move in both directions with maturity and consistency."]}, {"title": "Presence Quality", "q": "How much real, undistracted time do you spend together — not simply near each other, but genuinely present with each other?", "labels": ["Parallel Lives: You are often in the same environment, but meaningful connection is infrequent.", "Interrupted Connection: You spend time together, but distraction, fatigue, or routine regularly dilutes the quality of the experience.", "Consistent Presence: You regularly create moments of focused conversation, affection, attention, or shared experience.", "Deep Attunement: Your time together restores the relationship because both people are mentally, emotionally, and physically present."]}, {"title": "Behavioral Trust", "q": "Can your partner reliably trust your words, emotional steadiness, decisions, and follow-through over time?", "labels": ["Unreliable Pattern: Your partner cannot consistently predict whether your words, reactions, or commitments will hold under pressure.", "Inconsistent Safety: Your intentions are positive, but stress still creates noticeable inconsistency in your behavior or follow-through.", "Generally Reliable: Your partner can usually count on you, although a few recurring patterns still weaken trust.", "Embodied Trust: Your words, actions, emotional steadiness, and follow-through create a stable sense of safety."]}, {"title": "Recovery Speed", "q": "When tension or conflict occurs, how effectively do you repair the relationship and return to emotional safety?", "labels": ["Lingering Residue: Conflict leaves distance, resentment, silence, or emotional residue for too long.", "Slow Repair: You eventually reconnect, but the recovery consumes more time and emotional energy than it should.", "Healthy Recovery: You usually repair the relationship before tension hardens into resentment.", "Mature Reconnection: Conflict becomes useful information. You repair, learn, and return to connection without allowing the moment to define the relationship."]}, {"title": "Emotional Regulation", "q": "Can you remain grounded during tension with your partner — or do your emotions take control of the interaction?", "labels": ["Reactive Pattern: Tension quickly turns into defensiveness, shutdown, anger, anxiety, or escalation.", "Partially Grounded: You regulate well in some situations, but pressure still pulls you into familiar reactions.", "Mostly Steady: You usually remain grounded enough to respond with intention rather than react automatically.", "Regulated Presence: Even under pressure, you remain emotionally aware, respectful, clear, and connected to the larger purpose of the relationship."]}, {"title": "Listening Acuity", "q": "Can you understand what your partner meant, felt, or needed before defending your position or preparing your response?", "labels": ["Interpretation First: You frequently respond to your interpretation of the message rather than what your partner was actually trying to express.", "Partial Listening: You hear the words, but sometimes miss the emotion, need, or deeper meaning underneath them.", "Accurate Listening: You can usually reflect back what your partner meant and why it mattered.", "Deep Attunement: Your partner feels heard because you listen for meaning, emotion, need, and truth before responding."]}, {"title": "Directional Alignment", "q": "Are you and your partner building toward a compatible future — in values, lifestyle, priorities, and the life you each want to create?", "labels": ["Diverging Futures: You care about each other, but your long-term visions are pulling in different directions.", "Unclear Direction: You share some values, but important parts of the future remain vague, avoided, or insufficiently discussed.", "Mostly Aligned: Your lives are moving in the same general direction, although some details still require clearer agreement.", "Shared Trajectory: Your values, priorities, lifestyle, and long-term decisions consistently reinforce the same future."]}, {"title": "Decision Clarity", "q": "Can you make important decisions about finances, family, lifestyle, and the future without prolonged friction, avoidance, or resentment?", "labels": ["Decision Gridlock: Important decisions regularly create avoidance, conflict, power struggles, or unresolved resentment.", "Slow and Costly: Decisions are eventually made, but the process consumes too much emotional energy.", "Functional Clarity: You can usually reach decisions through reasonable communication, perspective, and compromise.", "Aligned Execution: You approach important decisions with clarity, respect, shared logic, and emotional maturity."]}, {"title": "Communication Impact", "q": "When you express an idea, need, or concern, how often does it genuinely land — understood, considered, and taken seriously?", "labels": ["Not Landing: Your words frequently feel dismissed, misunderstood, minimized, or forgotten.", "Inconsistent Impact: Some messages land, but others are diluted by distraction, defensiveness, or timing.", "Usually Received: Your partner generally understands and considers what you are trying to communicate.", "Clearly Integrated: Your communication creates understanding, adjustment, and a stronger relationship — not merely another conversation."]}, {"title": "Execution Rate", "q": "Do conversations about what needs to improve lead to lasting behavioral change — or do the same patterns continue to return?", "labels": ["Repeated Loops: The same issues return with little visible evidence of sustained improvement.", "Temporary Change: Behavior improves briefly, but the older pattern usually reappears.", "Measurable Progress: Honest conversations frequently lead to effort, adjustment, and better patterns.", "Integrated Change: What you discuss becomes lived behavior. The relationship strengthens because insight consistently becomes action."]}], "report": [{"title": "Authentic Transparency", "q": "Does this person feel safe bringing you accurate information about challenges, mistakes, and risks — or do they tell you what they believe you want to hear?", "labels": ["Managed Truth: They filter, soften, or conceal important information because candor does not feel fully safe.", "Selective Candor: They are honest in lower-risk situations, but still hold back when pressure, mistakes, or conflict arise.", "Mostly Open Channel: They generally bring you the information you need, even when the conversation is uncomfortable.", "Professional Candor: They raise truth, risk, and concern early, clearly, and respectfully without fear or performance."]}, {"title": "Relationship Reciprocity", "q": "Is accountability distributed appropriately, or are you carrying too much of the thinking, correction, and follow-through?", "labels": ["Leadership Drain: You consistently carry too much of the accountability, judgment, or corrective work.", "Uneven Load: They contribute, but you still have to over-remind, over-direct, or over-correct.", "Reliable Partnership: Accountability is mostly balanced, with only occasional leadership drag.", "Mutual Ownership: They carry their responsibilities with initiative, maturity, and ownership that makes leadership lighter."]}, {"title": "Presence Quality", "q": "How much focused, developmental attention do you give this person beyond reactive or transactional contact?", "labels": ["Transactional Contact: Most interactions are rushed, reactive, or limited to immediate tasks.", "Inconsistent Attention: You provide some developmental support, but urgency frequently crowds it out.", "Intentional Development: You regularly create space for coaching, clarity, and professional growth.", "High-Value Leadership: Your presence strengthens this person’s judgment, confidence, standards, and performance over time."]}, {"title": "Behavioral Trust", "q": "Can this person reliably predict your standards, your response under pressure, and your follow-through?", "labels": ["Unclear Signal: Your standards or reactions vary enough to create unnecessary uncertainty.", "Partial Predictability: They can usually read the situation, but pressure still produces mixed signals.", "Steady Standard: Your expectations, responses, and follow-through are generally clear and consistent.", "Trusted Operating Rhythm: They understand your standards and can operate confidently because your leadership is stable and predictable."]}, {"title": "Recovery Speed", "q": "When performance falls short or tension surfaces, how quickly do you address the issue and return the relationship to productive footing?", "labels": ["Avoided Friction: Issues linger too long, allowing tension or performance gaps to compound.", "Delayed Reset: You eventually address the issue, but the delay costs trust, momentum, or clarity.", "Timely Correction: You usually address tension or underperformance before it becomes a larger problem.", "Clean Reset: You name the issue, clarify the standard, repair the working relationship, and move forward without unnecessary residue."]}, {"title": "Emotional Regulation", "q": "Can you remain grounded during difficult conversations, or does frustration alter your tone, patience, or judgment?", "labels": ["Emotion Leads the Room: Frustration, anxiety, or impatience visibly shapes the interaction.", "Pulled Off Center: You remain composed in some moments, but pressure still affects your leadership presence.", "Steady Under Pressure: You usually remain grounded enough to lead the conversation productively.", "Executive Composure: You stay clear, calm, firm, and fair even when the conversation is uncomfortable."]}, {"title": "Listening Acuity", "q": "Can you accurately reflect what this person meant, needed, or was asking for before redirecting the conversation?", "labels": ["Answering Too Quickly: You respond before fully understanding the facts, concerns, or operational need.", "Partial Signal Received: You hear the primary point but occasionally miss the context underneath it.", "Meaning Captured: You can usually reflect the message accurately before deciding or redirecting.", "Precision Listening: They feel understood because you listen for facts, meaning, context, emotion, and operational relevance."]}, {"title": "Directional Alignment", "q": "Does this person clearly understand the direction you are building toward — and are they genuinely committed to supporting it?", "labels": ["Misaligned Motion: They are active, but their work does not consistently move in the required direction.", "Partial Buy-In: They understand part of the vision, but commitment or clarity remains inconsistent.", "Mostly Aligned: They understand the direction and usually make decisions that reinforce it.", "Shared Trajectory: They understand the mission, believe in the direction, and move with visible ownership."]}, {"title": "Decision Clarity", "q": "Can you resolve ambiguity, competing priorities, and disagreement without avoidable delay or emotional residue?", "labels": ["Decision Fog: Ambiguity creates delay, confusion, second-guessing, or silent frustration.", "Slow Resolution: Decisions are made, but the process consumes more energy than necessary.", "Functional Clarity: You usually convert disagreement or ambiguity into a workable decision.", "Clean Decision Channel: Priorities, ownership, and next actions become clear quickly and without unnecessary friction."]}, {"title": "Communication Impact", "q": "When you provide direction, feedback, or a standard, how accurately does it translate into the intended action?", "labels": ["Message Not Landing: Direction or feedback is frequently misunderstood, resisted, or executed poorly.", "Inconsistent Translation: They understand part of the message, but too much is lost between conversation and action.", "Usually Converts: Your communication usually produces the intended action or correction.", "High-Fidelity Execution: Your direction is accurately received, understood, and converted into aligned behavior."]}, {"title": "Execution Rate", "q": "Do your conversations convert into reliable, completed action — or do commitments require reminders, rescue, or rework?", "labels": ["Agreement Without Action: Conversations appear productive, but follow-through is weak.", "Leaky Execution: Some commitments are completed, but too many still require reminders or intervention.", "Reliable Follow-Through: Most agreements become completed action with reasonable consistency.", "Compounding Execution: Conversations convert into ownership, completion, and visible progress without unnecessary supervision."]}], "managed": [{"title": "Authentic Transparency", "q": "Can you be candid with this person about challenges, mistakes, and risks — or do you manage what they are allowed to see?", "labels": ["Managed Image: You carefully filter information because full honesty feels professionally or politically unsafe.", "Selective Honesty: You can speak candidly in some areas, but still hold back when the stakes feel high.", "Mostly Candid: You can usually raise concerns, mistakes, and challenges without over-managing the interaction.", "Professional Candor: You bring truth, context, and risk clearly without fear, unnecessary self-protection, or performance."]}, {"title": "Relationship Reciprocity", "q": "Does this person invest in your growth and advancement as meaningfully as you invest in their priorities and success?", "labels": ["One-Way Loyalty: You contribute heavily to their success, but your own growth receives little meaningful attention.", "Uneven Investment: They support you occasionally, but your development is not treated as a consistent priority.", "Mutual Professional Value: You help them succeed, and they generally support your growth, visibility, and advancement.", "Sponsorship-Level Reciprocity: They actively invest in your future, not merely your usefulness in the present."]}, {"title": "Presence Quality", "q": "How much useful, focused access does this person give you beyond rushed, reactive, or transactional contact?", "labels": ["Transactional Access: Most contact is rushed, problem-driven, or limited to immediate tasks.", "Limited Strategic Attention: You receive some access, but it is inconsistent or overly reactive.", "Useful Access: They regularly give you enough focused attention to clarify expectations and direction.", "High-Value Access: Their attention sharpens your judgment, expands your perspective, and strengthens your ability to operate at a higher level."]}, {"title": "Behavioral Trust", "q": "Can this person trust your judgment and execution without unnecessary monitoring, repeated follow-up, or verification?", "labels": ["Under the Microscope: They feel the need to monitor, control, or verify too much of your work.", "Conditional Trust: They trust you in some areas but increase oversight significantly when the stakes rise.", "Trusted Operator: They generally trust your judgment, ownership, and ability to deliver.", "Autonomous Confidence: Your track record allows them to trust you with meaningful work and strategic discretion."]}, {"title": "Recovery Speed", "q": "When expectations are missed or tension surfaces, how quickly does the relationship return to open, productive footing?", "labels": ["Lingering Tension: Missed expectations create guardedness, distance, or unresolved friction.", "Slow Reset: The relationship eventually stabilizes, but recovery consumes too much time or energy.", "Productive Repair: Tension is usually addressed and the relationship returns to useful footing.", "Fast Professional Reset: The issue is clarified, expectations are reset, and both parties move forward without residue."]}, {"title": "Emotional Regulation", "q": "Can you remain grounded around this person, or does the power dynamic cause you to shrink, over-explain, react, or overcompensate?", "labels": ["Power Dynamic Hijack: Their position consistently alters your confidence, clarity, or emotional steadiness.", "Pulled Off Center: You remain composed in some situations, but pressure still affects your presence.", "Steady Professional Presence: You usually remain clear, respectful, and grounded even when the interaction is uncomfortable.", "Executive-Level Composure: You remain calm, direct, self-possessed, and thoughtful regardless of title, pressure, or stakes."]}, {"title": "Listening Acuity", "q": "Can you accurately reflect what this person said, meant, and expected before acting on assumptions?", "labels": ["Assumption Mode: You regularly act on interpretation before confirming the actual expectation.", "Partial Signal: You understand the primary message but occasionally miss context, priority, or risk.", "Clear Readback: You can usually reflect the meaning and expectation before acting.", "Precision Understanding: You listen for words, intent, priority, risk, and unstated assumptions with high accuracy."]}, {"title": "Directional Alignment", "q": "Are you and this person aligned on the direction of your role, your growth, and the future value you are building?", "labels": ["Unclear Future: There is no shared understanding of where the role or relationship is heading.", "Loose Alignment: There is general agreement, but the path forward remains vague or assumed.", "Shared Direction: You are mostly aligned on expectations, development, and future opportunity.", "Defined Growth Path: Role expectations, advancement, development, and future contribution are clearly aligned."]}, {"title": "Decision Clarity", "q": "Can you reach clarity on direction, priorities, and expectations without unnecessary delay or political interpretation?", "labels": ["Political Fog: Priorities are shaped by guesswork, unclear signals, or shifting expectations.", "Slow Clarity: Direction eventually becomes clear, but only after avoidable uncertainty or back-and-forth.", "Functional Clarity: You can usually clarify priorities and next actions without significant friction.", "Clean Priority Channel: Direction, ownership, expectations, and next steps become clear quickly and without unnecessary politics."]}, {"title": "Communication Impact", "q": "When you bring ideas, solutions, or concerns forward, how often do they meaningfully register and influence action?", "labels": ["Unheard Contribution: Your ideas or concerns are frequently dismissed, ignored, or forgotten.", "Inconsistent Reception: Some input lands, but too much is minimized, delayed, or left unresolved.", "Valued Input: Your ideas and concerns are usually heard, considered, and sometimes acted upon.", "Influence With Impact: Your communication shapes decisions, improves outcomes, and creates visible movement."]}, {"title": "Execution Rate", "q": "Do conversations about your development, expectations, and opportunities result in meaningful follow-through?", "labels": ["Conversation Without Conversion: Promises or development discussions regularly disappear after the meeting.", "Inconsistent Follow-Through: Some commitments move forward, but too many require repeated reminders.", "Reliable Movement: Conversations usually lead to action, clarified expectations, or measurable progress.", "Development Becomes Reality: What is discussed consistently converts into accountability, opportunity, and visible growth."]}]};
const COMMON=[{"pillar": "Identity Anchor", "title": "Session-Identity Proof", "q": "When you examine what you actually did last week — rather than what you intended, planned, or said — how closely did your sessions match the identity you claim to be building?", "labels": ["Weak Evidence: Your calendar, actions, and completed sessions provide little proof of the identity you say you want.", "Inconsistent Evidence: You completed some aligned sessions, but too much of the week still drifted from your stated direction.", "Credible Evidence: Your choices, work blocks, conversations, and habits show meaningful proof of the identity you are building.", "Identity Made Visible: Your repeated sessions make your standards obvious. Your calendar provides evidence without requiring explanation."]}, {"pillar": "Identity Anchor", "title": "OS Currency", "q": "How much of what you think, tolerate, avoid, and repeat is still running on an older version of you?", "labels": ["Legacy OS Still Active: Old fears, tolerances, habits, and reactions still shape too many of your decisions.", "Partial Upgrade: You have evolved mentally, but pressure still activates older standards and familiar defaults.", "Mostly Current: Your boundaries, choices, and repeated patterns increasingly reflect the person you are becoming.", "Current Version Installed: Your decisions, standards, and tolerances consistently match your present direction rather than your previous conditioning."]}, {"pillar": "Identity Anchor", "title": "Installation Rate", "q": "Of the sessions you repeat most often — work blocks, health choices, conversations, and decisions under pressure — how many are structured well enough to compound for the next five years?", "labels": ["Mostly Manual: Too much of your life still depends on mood, memory, urgency, or willpower.", "Partial Installation: Some routines work reliably, but several important sessions remain inconsistent.", "Core Systems Installed: Your highest-value sessions have enough structure to repeat with reasonable consistency.", "Compounding Architecture: Your essential sessions are designed well enough to reinforce your future with minimal unnecessary friction."]}, {"pillar": "Identity Anchor", "title": "Identity Integration", "q": "Does the same mature version of you show up across health, wealth, and relationships — or is one pillar being strengthened at the expense of the others?", "labels": ["One Pillar Is Consuming the Rest: One area dominates your life while other important areas quietly absorb the cost.", "Uneven Standards: You demonstrate discipline in one area but inconsistency, neglect, or avoidance in another.", "Increasing Integration: Your standards are becoming more consistent across the major areas of your life.", "One Identity, Three Pillars: The same grounded, capable version of you appears across your health, wealth, and relationships."]}, {"pillar": "Identity Anchor", "title": "Identity Velocity", "q": "Compared with 12 months ago, how measurably different are your standards, defaults, tolerances, and decisions under pressure?", "labels": ["New Calendar, Familiar Patterns: Your circumstances may have changed, but your identity has not changed enough to alter your trajectory.", "Gradual Movement: You can see progress, but many defaults still feel too familiar.", "Clear Upgrade: Your standards, decisions, and tolerances are noticeably stronger than they were one year ago.", "Compounding Transformation: Your repeated decisions have changed so consistently that your former operating system no longer feels like an accurate description of you."]}, {"pillar": "Wealth", "title": "Leadership Leverage", "q": "If you stepped away from your job or business for 30 days, what would your absence reveal about the value you create and the systems surrounding you?", "labels": ["Low Distinctive Leverage: Your absence would create limited impact because your value is not yet sufficiently differentiated or visible.", "Operational Frictio     const vname=VNAMES[variant]||"";
    const{relationships_score:rS,identity_score:iS,wealth_score:wS,health_score:hS,overall_score:overall}=cachedScores;
    const hdrs={"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY};
    const r1=await fetch(SB_URL+"/rest/v1/assessment_responses",{
      method:"POST",
      headers:{...hdrs,"Prefer":"return=representation"},
      body:JSON.stringify({
        session_id:SESSION_ID,
        relationship_variant:vname,
        answers:answers,
        relationships_score:rS,
        identity_score:iS,
        wealth_score:wS,
        health_score:hS,
        overall_score:overall,
        email_gated:false,
        tier:"survey"
      })
    });
    if(!r1.ok){console.warn("raw response insert skipped:",r1.status);return;}
    const [row]=await r1.json();
    const rid=row.id;
    const ansRows=QA.map((q,i)=>({
      response_id:rid,
      session_id:SESSION_ID,
      question_index:i,
      pillar:q.pillar,
      question_title:q.title,
      answer:answers[i]||"",
      score:answers[i]?SCORES[answers[i]]:null
    }));
    await fetch(SB_URL+"/rest/v1/assessment_answers",{method:"POST",headers:hdrs,body:JSON.stringify(ansRows)});
  }catch(e){
    console.warn("raw response save failed (non-blocking):",e);
  }
}

// Score is free. This is the one and only handoff point to report.html,
// which owns the single name/email gate before generating the AI report.
function goToReport(){
  const{relationships_score:rS,identity_score:iS,wealth_score:wS,health_score:hS,overall_score:overall}=cachedScores;
  sessionStorage.setItem("5yfh_scores",JSON.stringify({
    overall:overall,
    relationships:rS,
    identity:iS,
    wealth:wS,
    health:hS,
    variant:gender||"female",
    submission_id:null
  }));
  saveRawResponse(); // fire-and-forget, does not block the redirect
  window.location.href="report.html";
}

render();
</script>
